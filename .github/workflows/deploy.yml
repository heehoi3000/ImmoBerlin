name: Deploy to GitHub Pages

# Das Skript startet automatisch, wenn du auf den "main" Branch pushst
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Oder die Node-Version, die du nutzt
          
      - name: Install dependencies
        run: npm install
        
      - name: Build Project
        # Hier werden deine Supabase Secrets beim Bauen eingefügt!
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # WICHTIG: Wenn du Vite nutzt, heißt der Ordner './dist'. 
          # Wenn du Create React App nutzt, ändere das hier zu './build'
          path: './dist' 
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4